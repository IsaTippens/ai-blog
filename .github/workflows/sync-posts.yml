name: Sync Blog Posts from Google Drive

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour automatically
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants write permissions to push the commit

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run Sync Script
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          python scripts/sync_posts.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add posts/
          
          if git diff --staged --quiet; then
            echo "No new posts or updates found. Repository is up to date."
          else
            git commit -m "chore: sync blog posts from Google Drive [skip ci]"
            git push origin main
          fi
